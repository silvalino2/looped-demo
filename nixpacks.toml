[phases.setup]
nixPkgs = ["nodejs_18", "python3", "ffmpeg", "unzip"]

[phases.install]
cmds = [
  "npm run install:all",
  "curl -fsSL https://deno.land/install.sh | sh",
  "cp /root/.deno/bin/deno /usr/local/bin/deno"
]

[phases.build]
cmds = ["cd client && npm run build"]

[start]
cmd = "cd server && node server.js"
